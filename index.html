<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lion City Soundscapes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="wrapper">
        <header>
             <h2>Explore Singapore Soundscapes</h2>
        </header>

 <nav>
    <ul>
        <li><a href="index.html">Recentre</a></li>
        <li id="about-nav">
            <div id="filter-container">
                <p><strong>Filter Category:</strong></p>
                <label><input type="checkbox" class="type-filter" value="C&T" checked> <span class="legend-circle pin-ct"></span> Calm & Tranquil</label>
                <label><input type="checkbox" class="type-filter" value="C&R" checked> <span class="legend-circle pin-cr"></span> Chaotic & Restless</label>
                <label><input type="checkbox" class="type-filter" value="B&L" checked> <span class="legend-circle pin-bl"></span> Boring and Lifeless</label>
                <label><input type="checkbox" class="type-filter" value="F&E" checked> <span class="legend-circle pin-fe"></span> Exciting & Full of Life</label>
                <label><input type="checkbox" class="type-filter" value="-" checked> <span class="legend-circle pin-dash"></span> N/A</label>
            </div>
            <div id="spl-legend" style="background: #fff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #E4CDA7;">
    <div class="legend-title" style="display: flex; flex-direction: column; gap: 12px;">
        
        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-spl" value="spl" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-spl" style="cursor: pointer; margin: 0; font-weight: bold;">Sound Pressure Level (dBA)</label>
            </div>
            <div id="legend-spl" class="heatmap-legend">
                <div class="legend-gradient grad-spl"></div>
                <div class="legend-labels">
                    <span>&lt;50</span>
                    <span>60</span>
                    <span>&gt;70</span>
                </div>
            </div>
        </div>

        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-isopl" value="ISOPL" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-isopl" style="cursor: pointer; margin: 0; font-weight: bold;">ISO Pleasantness</label>
            </div>
            <div id="legend-isopl" class="heatmap-legend">
                <div class="legend-gradient grad-isopl"></div>
                <div class="legend-labels">
                    <span>-0.29</span>
                    <span>0</span>
                    <span>0.41</span>
                </div>
            </div>
        </div>

        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-isoev" value="ISOEV" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-isoev" style="cursor: pointer; margin: 0; font-weight: bold;">ISO Eventfulness</label>
            </div>
            <div id="legend-isoev" class="heatmap-legend">
                <div class="legend-gradient grad-isoev"></div>
                <div class="legend-labels">
                    <span>-0.43</span>
                    <span>0</span>
                    <span>0.40</span>
                </div>
            </div>
        </div>
        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-loudness" value="loudness" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-loudness" style="cursor: pointer; margin: 0; font-weight: bold;">Loudness (sone)</label>
            </div>
            <div id="legend-loudness" class="heatmap-legend">
                <div class="legend-gradient grad-loudness"></div>
                <div class="legend-labels">
                    <span>&lt;10</span>
                    <span>30</span>
                    <span>&gt;50</span>
                </div>
            </div>
        </div>

        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-sharpness" value="sharpness" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-sharpness" style="cursor: pointer; margin: 0; font-weight: bold;">Sharpness (acum)</label>
            </div>
            <div id="legend-sharpness" class="heatmap-legend">
                <div class="legend-gradient grad-sharpness"></div>
                <div class="legend-labels">
                    <span>&lt;1.0</span>
                    <span>1.6</span>
                    <span>&gt;1.9</span>
                </div>
            </div>
        </div>

        <div>
            <div style="display: flex; align-items: center;">
                <input type="checkbox" class="heatmap-toggle" id="toggle-roughness" value="roughness" style="margin-right: 8px; cursor: pointer;">
                <label for="toggle-roughness" style="cursor: pointer; margin: 0; font-weight: bold;">Roughness (asper)</label>
            </div>
            <div id="legend-roughness" class="heatmap-legend">
                <div class="legend-gradient grad-roughness"></div>
                <div class="legend-labels">
                    <span>&lt;0.02</span>
                    <span>0.03</span>
                    <span>&gt;0.04</span>
                </div>
            </div>
        </div>

    </div>
</div>
        </li>
    </ul>
</nav>
        <main>
            <div class="search-wrapper">
                <input type="text" id="location-search" placeholder="Search for a location... (e.g., NTU, Tampines)">
                <div id="search-suggestions" class="suggestions-box"></div>
            </div>
            
            <div id="map-container" style="position: relative;">
                <div id="map"></div>
                
                <div id="video-modal" class="modal-hidden">
                    <div class="modal-content">
                        <span id="close-modal">&times; </span>
                        <div id="video-player-container"></div>
                    </div>
                </div>
            </div>

            <div id="type-display">
                Select a location on the map to view its soundscape type.
                <div id="details-container"></div>
            </div>

        </main>

        <footer>
            <p>Copyright &copy; 2026 Singapore Soundscapes</p>
            <p><a href="mailto:xtan100@e.ntu.edu.sg">xtan100@e.ntu.edu.sg</a></p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="map-logic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
